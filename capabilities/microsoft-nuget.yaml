      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: microsoft-nuget.pushpackage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-unlist-package-packagepublish
      description: Delete or unlist a package (PackagePublish)
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: microsoft-nuget.deletepackage
      outputParameters:
      - type: object
        mapping: $.
    - name: search-query-service
