apis:
  - aid: microsoft-nuget:server-api
    name: NuGet Server API
    tags:
      - .NET
      - NuGet
      - Package Management
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://api.nuget.org/v3/
    humanURL: https://learn.microsoft.com/en-us/nuget/api/overview
    properties:
      - url: https://learn.microsoft.com/en-us/nuget/api/overview
        type: Documentation
      - url: https://learn.microsoft.com/en-us/nuget/api/search-query-service-resource
        type: Reference
      - url: openapi/microsoft-nuget-openapi.yml
        type: OpenAPI
    description: >-
      The NuGet Server API (v3) provides RESTful access to the NuGet package registry. Developers can search packages,
      download package content, retrieve package metadata and versions, push new packages, and manage package listings.
      The API uses a service index pattern for resource discovery and supports both nuget.org and private feeds.
