  - NuGet
  - Package Management
url: https://raw.githubusercontent.com/api-evangelist/microsoft-nuget/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: microsoft-nuget:server-api
    name: NuGet Server API
    tags:
      - .NET
      - NuGet
      - Package Management
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.nuget.org/v3/
    humanURL: https://learn.microsoft.com/en-us/nuget/api/overview
    properties:
      - url: https://learn.microsoft.com/en-us/nuget/api/overview
        type: Documentation
      - url: https://learn.microsoft.com/en-us/nuget/api/search-query-service-resource
        type: Reference
    description: >-
      The NuGet Server API (v3) provides RESTful access to the NuGet
      package registry. Developers can search packages, download package
      content, retrieve package metadata and versions, push new packages,
      and manage package listings. The API uses a service index pattern
      for resource discovery and supports both nuget.org and private feeds.
