aid: microsoft-nuget
name: Microsoft NuGet
description: >-
  NuGet is the package manager for .NET, hosted by Microsoft. It provides APIs for searching, downloading, publishing,
  and managing .NET packages through the NuGet Gallery and private feeds.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
